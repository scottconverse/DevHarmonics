name: Bug report
description: Report a reproducible DevHarmonics defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include passwords, OAuth tokens, one-time authorization codes, or private repository content.
  - type: input
    id: version
    attributes:
      label: DevHarmonics version
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options: [Not provider-specific, Codex, Claude, Gemini / Antigravity, Multiple]
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node version, Git version, and relevant CLI versions.
    validations:
      required: true
