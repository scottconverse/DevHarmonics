name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    name: Full suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run release-truth checks and the full suite
        run: npm run check

  randomized-order:
    name: Randomized test-file order
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run every test file in seeded shuffled order
        run: npm run test:randomized -- --seed "${{ github.run_id }}-${{ github.run_attempt }}"

  mutation-discipline:
    name: Mutation discipline
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Prove the verification-integrity sentinel can fail
        run: npm run test:mutation
